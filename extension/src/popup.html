<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px;
    }
    p {
      font-size: 13px;
      color: #555;
      margin: 0 0 12px;
      line-height: 1.4;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .status-dot.offline {
      background: #ef4444;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Kenya Speed Limits</h1>
  <p>Speed limit overlays for Kenyan roads on Google Maps.</p>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Checking API...</span>
  </div>
  <p style="margin-top: 12px;"><a href="https://github.com/kamau/speed" target="_blank">GitHub Repo</a></p>

  <script src="popup.js"></script>
</body>
</html>
