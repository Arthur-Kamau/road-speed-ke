services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: speed
      POSTGRES_PASSWORD: speed_dev
      POSTGRES_DB: speed_limits
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speed -d speed_limits"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
